<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор Логотипа</title>
    <!-- Подключаем готический шрифт из Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #111; /* Темный фон, чтобы лучше видеть эффект */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .generated-logo {
            font-family: "Metal Mania", system-ui;
            font-size: 120px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 3px;
            
            /* Создаем черный контур вокруг букв */
            -webkit-text-stroke: 3px #000000;
            
            /* Накладываем розовую глиттерную текстуру внутрь текста */
            /* Замените ссылку ниже на любую картинку блесток или розового шума */
            background: url('https://unsplash.com') center;
            background-size: cover;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Розовое неоновое свечение сзади букв */
            filter: drop-shadow(0 0 15px rgba(255, 51, 119, 0.8)) 
                    drop-shadow(0 0 30px rgba(0, 0, 0, 0.9));
        }
    </style>
</head>
<body>

    <h1 class="generated-logo">Mortifer Live</h1>

</body>
</html>
